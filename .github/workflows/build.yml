name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build
        run: cd TabCargos-source/TabCargos && mvn package -q
      - uses: actions/upload-artifact@v4
        with:
          name: TabCargos
          path: TabCargos-source/TabCargos/target/TabCargos-1.0.0.jar
